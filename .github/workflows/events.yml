name: M2M events imports

on:
  schedule:
    # 3x daily to burn through 1000 SerpAPI searches by 2026-03-26
    # Phoenix = UTC-7 year-round
    - cron: "20 13 * * *"   # 06:20 Phoenix (morning)
    - cron: "20 18 * * *"   # 11:20 Phoenix (midday)
    - cron: "20 23 * * *"   # 16:20 Phoenix (afternoon)
  workflow_dispatch:
    inputs:
      daily_cap:
        description: "How many SerpAPI searches to run this execution"
        required: false
        default: "50"
      dry_run:
        description: "Set to 1 to test without spending credits"
        required: false
        default: "0"

concurrency:
  group: serpapi-events-daily
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Debug repo layout
        shell: bash
        run: |
          set -euo pipefail
          pwd
          ls -la
          echo "---- scripts ----"
          ls -la scripts || true
          echo "---- data_events ----"
          ls -la data_events || true

      - name: Create venv + install deps
        shell: bash
        run: |
          set -euo pipefail
          python -m venv .venv-events
          ./.venv-events/bin/python -m pip install --upgrade pip
          ./.venv-events/bin/python -m pip install requests

      - name: Run capped SerpAPI fetch
        shell: bash
        env:
          SERPAPI_API_KEY: ${{ secrets.SERPAPI_API_KEY }}
          DAILY_CAP: ${{ github.event_name == 'workflow_dispatch' && inputs.daily_cap || '50' }}
          DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run || '0' }}
          # Expanded terms & filters to create enough unique task IDs for 3 runs/day
          TERMS: >-
            dog friendly events,dog adoption event,pet adoption event,
            dog rescue fundraiser,pet friendly festival,dog meetup
          DATE_FILTERS: >-
            date:today,date:tomorrow,date:week,date:next_week,date:month,date:next_month
          # Two pagination offsets doubles unique tasks per hub
          STARTS: "0,10"
          # Faster throttle to finish each run quickly
          THROTTLE: "2.0"
        run: |
          set -euo pipefail
          echo "event_name=${{ github.event_name }}"
          echo "DAILY_CAP=$DAILY_CAP"
          echo "DRY_RUN=$DRY_RUN"
          if [[ -z "${SERPAPI_API_KEY:-}" ]]; then
            echo "SERPAPI_API_KEY is missing (repo secret not set for this repo/environment)."
            exit 2
          fi
          test -f scripts/serpapi_run_with_daily_cap.sh || { echo "Missing scripts/serpapi_run_with_daily_cap.sh"; exit 2; }
          chmod +x scripts/serpapi_run_with_daily_cap.sh
          ./scripts/serpapi_run_with_daily_cap.sh

      - name: Normalize (optional but useful)
        shell: bash
        run: |
          set -euo pipefail

          if compgen -G "data_events/raw/**/*.jsonl" > /dev/null; then
            echo "Found raw input files. Running normalize."
            ./.venv-events/bin/python scripts/normalize_serpapi_google_events.py \
              --in-glob "data_events/raw/**/*.jsonl" \
              --out "data_events/events.normalized.jsonl"
          else
            echo "No raw event files found at data_events/raw/**/*.jsonl. Skipping normalize."
          fi

      - name: Upload normalized + run manifests (artifacts)
        uses: actions/upload-artifact@v4
        with:
          name: events-normalized-and-manifests
          path: |
            data_events/events.normalized.jsonl
            data_events/dataRan/serpapi_runs/*.json
          if-no-files-found: ignore
